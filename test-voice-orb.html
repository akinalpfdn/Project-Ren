<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voice Orb Test</title>
  <style>
    body {
      margin: 0;
      background-color: #1a1a1a;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      display: block;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      display: flex;
      gap: 10px;
      color: white;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
<div id="controls">
  <label>Intensity <input type="range" id="intensity" min="0" max="1" step="0.01" value="0.2" /></label>
</div>
<script type="module">
  import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

  const vertexShader = `
    uniform float uTime;
    uniform float uSpeed;
    uniform float uNoiseDensity;
    uniform float uNoiseStrength;

    varying vec3 vColor;
    varying vec3 vPosition;

    // Simplex 3D Noise
    vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
    vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
    float snoise(vec3 v){ 
      const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
      const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
      vec3 i  = floor(v + dot(v, C.yyy) );
      vec3 x0 = v - i + dot(i, C.xxx) ;
      vec3 g = step(x0.yzx, x0.xyz);
      vec3 l = 1.0 - g;
      vec3 i1 = min( g.xyz, l.zxy );
      vec3 i2 = max( g.xyz, l.zxy );
      vec3 x1 = x0 - i1 + 1.0 * C.xxx;
      vec3 x2 = x0 - i2 + 2.0 * C.xxx;
      vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
      i = mod(i, 289.0 ); 
      vec4 p = permute( permute( permute( 
                 i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
               + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
               + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
      float n_ = 1.0/7.0; 
      vec3  ns = n_ * D.wyz - D.xzx;
      vec4 j = p - 49.0 * floor(p * ns.z *ns.z); 
      vec4 x_ = floor(j * ns.z);
      vec4 y_ = floor(j - 7.0 * x_ ); 
      vec4 x = x_ *ns.x + ns.yyyy;
      vec4 y = y_ *ns.x + ns.yyyy;
      vec4 h = 1.0 - abs(x) - abs(y);
      vec4 b0 = vec4( x.xy, y.xy );
      vec4 b1 = vec4( x.zw, y.zw );
      vec4 s0 = floor(b0)*2.0 + 1.0;
      vec4 s1 = floor(b1)*2.0 + 1.0;
      vec4 sh = -step(h, vec4(0.0));
      vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
      vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
      vec3 p0 = vec3(a0.xy,h.x);
      vec3 p1 = vec3(a0.zw,h.y);
      vec3 p2 = vec3(a1.xy,h.z);
      vec3 p3 = vec3(a1.zw,h.w);
      vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
      p0 *= norm.x;
      p1 *= norm.y;
      p2 *= norm.z;
      p3 *= norm.w;
      vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
      m = m * m;
      return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), 
                                    dot(p2,x2), dot(p3,x3) ) );
    }

    void main() {
      float noise = snoise(position * uNoiseDensity + uTime * uSpeed);
      vec3 newPosition = position + normal * noise * uNoiseStrength;
      vPosition = newPosition;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
    }
  `;

  const fragmentShader = `
    uniform vec3 uColorTop;
    uniform vec3 uColorBottom;
    varying vec3 vPosition;

    void main() {
      // Map local y position to a gradient t
      float yMapping = (vPosition.y + 1.0) / 2.0; 
      yMapping = clamp(yMapping, 0.0, 1.0);
      
      // Interpolate colors based on y
      vec3 color = mix(uColorBottom, uColorTop, yMapping);
      
      gl_FragColor = vec4(color, 1.0);
    }
  `;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.z = 3;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  const geometry = new THREE.IcosahedronGeometry(1.2, 32); 

  const material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    wireframe: true,
    uniforms: {
      uTime: { value: 0 },
      uSpeed: { value: 0.5 },
      uNoiseDensity: { value: 1.5 },
      uNoiseStrength: { value: 0.2 },
      uColorTop: { value: new THREE.Color("#42bcf5") }, // Light Blue
      uColorBottom: { value: new THREE.Color("#9c27b0") } // Purple
    }
  });

  const sphere = new THREE.Mesh(geometry, material);
  scene.add(sphere);

  const intensityInput = document.getElementById('intensity');

  let baseNoiseStrength = 0.2;
  let targetNoiseStrength = 0.2;
  let baseSpeed = 0.5;
  let targetSpeed = 0.5;

  intensityInput.addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    // As intensity goes up (0 to 1), strength increases
    targetNoiseStrength = 0.1 + val * 0.4;
    targetSpeed = 0.5 + val * 2.5; 
  });

  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    
    // Smoothly interpolate to targets
    material.uniforms.uNoiseStrength.value += (targetNoiseStrength - material.uniforms.uNoiseStrength.value) * 0.1;
    material.uniforms.uSpeed.value += (targetSpeed - material.uniforms.uSpeed.value) * 0.1;

    material.uniforms.uTime.value = clock.getElapsedTime() * material.uniforms.uSpeed.value;

    sphere.rotation.y += 0.002;
    sphere.rotation.x += 0.001;

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
